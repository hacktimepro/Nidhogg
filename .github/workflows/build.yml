name: Build Nidhogg

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install WDK VSIX extension
      run: |
        # The windows-2022 runner has WDK installed but the VS extension may not be registered
        # Find and install WDK.vsix
        $vsixPaths = @(
          "${env:ProgramFiles(x86)}\Windows Kits\10\Vsix\VS2022\WDK.vsix",
          "${env:ProgramFiles(x86)}\Windows Kits\10\Vsix\VS2022\10.0.22621.0\WDK.vsix"
        )
        # Search more broadly
        $found = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\Vsix" -Recurse -Filter "WDK.vsix" -ErrorAction SilentlyContinue
        if ($found) {
          $vsixPath = $found[0].FullName
          Write-Host "Found WDK VSIX at: $vsixPath"
          
          $vsixInstaller = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property enginePath | Join-Path -ChildPath 'VSIXInstaller.exe'
          Write-Host "VSIX Installer: $vsixInstaller"
          
          # Install silently
          Start-Process -FilePath $vsixInstaller -ArgumentList "/q", $vsixPath -Wait -NoNewWindow
          Write-Host "WDK VSIX extension installed"
        } else {
          Write-Host "WDK VSIX not found, checking if WDK targets exist..."
          # Check if WindowsDriver.common.targets exists
          $targets = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10" -Recurse -Filter "WindowsDriver.common.targets" -ErrorAction SilentlyContinue
          if ($targets) {
            Write-Host "WDK targets found at: $($targets.FullName)"
          } else {
            Write-Host "WARNING: WDK targets not found!"
          }
        }
      shell: powershell

    - name: Verify WDK installation
      run: |
        Write-Host "=== WDK Include directories ==="
        Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory | ForEach-Object { Write-Host $_.FullName }
        
        Write-Host "`n=== Checking for ntifs.h ==="
        $ntifs = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Recurse -Filter "ntifs.h" -ErrorAction SilentlyContinue
        if ($ntifs) {
          $ntifs | ForEach-Object { Write-Host "Found: $($_.FullName)" }
        } else {
          Write-Host "ntifs.h NOT found in WDK includes"
        }
        
        Write-Host "`n=== WDK Build targets ==="
        Get-ChildItem "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\MSBuild\Microsoft\VC\v170\Platforms" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
        
        Write-Host "`n=== WindowsDriver targets ==="
        Get-ChildItem -Path "C:\" -Recurse -Filter "WindowsDriver.KernelMode.props" -ErrorAction SilentlyContinue | Select-Object -First 5 | ForEach-Object { Write-Host $_.FullName }
      shell: powershell

    - name: Build Driver (Nidhogg.sys) - Release x64
      run: |
        msbuild Nidhogg\Nidhogg.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m
      shell: cmd

    - name: Build Client (NidhoggClient.exe) - Release x64
      run: |
        msbuild NidhoggClient\NidhoggClient.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m
      shell: cmd

    - name: Collect artifacts
      run: |
        mkdir artifacts
        # Search for output files
        Get-ChildItem -Recurse -Include "Nidhogg.sys","NidhoggClient.exe","Nidhogg.pdb","NidhoggClient.pdb" | ForEach-Object {
          Write-Host "Found: $($_.FullName)"
          Copy-Item $_.FullName artifacts\ -Force
        }
        Write-Host "`nArtifacts collected:"
        Get-ChildItem artifacts\
      shell: powershell

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nidhogg-release-x64
        path: artifacts/
        if-no-files-found: error
